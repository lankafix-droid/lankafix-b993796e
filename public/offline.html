<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E4C92" />
  <title>LankaFix – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #F5F7FA;
      color: #0D1B2A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1.5rem;
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
    }
    .card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(14, 76, 146, 0.08);
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.25rem;
      background: #EEF4FB;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 28px; height: 28px; color: #0E4C92; }
    h1 { font-family: 'Montserrat', system-ui, sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #667085; line-height: 1.5; margin-bottom: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: linear-gradient(135deg, #2FAE66, #1A9C8B, #0E4C92);
      color: #fff; font-weight: 600; font-size: 0.875rem;
      padding: 0.75rem 1.75rem; border-radius: 0.75rem;
      border: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(14, 76, 146, 0.2);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .brand { font-size: 0.75rem; color: #98A2B3; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072" />
        <line x1="4" y1="4" x2="20" y2="20" stroke-linecap="round" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like your internet connection dropped. Please check your Wi‑Fi or mobile data and try again.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M20.49 9A9 9 0 105.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 013.51 15" />
      </svg>
      Try Again
    </button>
    <p class="brand">LankaFix – Smart Repair & Technical Services</p>
  </div>
</body>
</html>
